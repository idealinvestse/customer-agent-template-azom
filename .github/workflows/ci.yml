name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Ubuntu 24 ships 3.12; keep 3.11 in CI for slightly broader coverage
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff

      - name: Ruff
        run: ruff check skills/ecom_ops tests

      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck bin/*.sh
          # install-ubuntu26 is long; still lint
          shellcheck -x bin/install-ubuntu26.sh bin/install.sh

      - name: Pytest
        env:
          AZOM_USE_MOCK: "1"
          AZOM_CONFIG_DIR: ${{ github.workspace }}/config
        run: pytest --cov=ecom_ops --cov-report=term-missing --cov-fail-under=65

      - name: Smoke spinup script
        run: bash tests/test_spinup.sh

      - name: Mock integration smoke
        env:
          AZOM_USE_MOCK: "1"
          AZOM_LIVE_SMOKE: "1"
          AZOM_CONFIG_DIR: ${{ github.workspace }}/config
        run: python -m ecom_ops --mock smoke --live

      - name: Validate systemd units + install scripts
        run: |
          test -f infrastructure/systemd/azom-dashboard.service
          test -f infrastructure/systemd/azom-bot.service
          test -f infrastructure/systemd/azom-daily-brief.timer
          test -f docs/DEPLOY_UBUNTU24_HETZNER.md
          test -f docs/AUTO_INSTALL.md
          test -x bin/install-ubuntu26.sh || chmod +x bin/install-ubuntu26.sh bin/install.sh
          bash -n bin/install-ubuntu26.sh
          bash -n bin/install.sh
          bash bin/install-ubuntu26.sh --help | head -5
