name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck bin/*.sh

      - name: Pytest
        env:
          AZOM_USE_MOCK: "1"
          AZOM_CONFIG_DIR: ${{ github.workspace }}/config
        run: pytest --cov=ecom_ops --cov-report=term-missing

      - name: Smoke spinup script
        run: bash tests/test_spinup.sh
