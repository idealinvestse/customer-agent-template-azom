# Production compose for Ubuntu 24 / Hetzner.
# Usage (from repo root):
#   docker compose -f infrastructure/docker-compose.prod.yml up -d --build
services:
  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    image: azom-agent:1.1
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AZOM_CONFIG_DIR: /app/config
      AZOM_DATA_DIR: /app/.azom-data
      AZOM_USE_MOCK: ${AZOM_USE_MOCK:-0}
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8080"
      DASHBOARD_USER: ${DASHBOARD_USER:-jonatan}
    volumes:
      - ../config:/app/config:ro
      - azom-data:/app/.azom-data
      - ../logs:/app/logs
    # Bind to localhost only — put nginx/Caddy in front for TLS
    ports:
      - "127.0.0.1:8080:8080"
    command: ["python", "infrastructure/dashboard/app.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    image: azom-agent:1.1
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AZOM_CONFIG_DIR: /app/config
      AZOM_DATA_DIR: /app/.azom-data
      AZOM_USE_MOCK: ${AZOM_USE_MOCK:-0}
    volumes:
      - ../config:/app/config:ro
      - azom-data:/app/.azom-data
      - ../logs:/app/logs
    command: ["bash", "bin/dedicated-bot.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  azom-data:
